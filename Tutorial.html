<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WE-Core | Tutorials</title>
<link rel="shortcut icon" href="img/we-core.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Cairo',sans-serif;background:#f0ecf8;min-height:100vh;}
.header{background:linear-gradient(135deg,#4a1a72 0%,#7b3fe4 100%);text-align:center;padding:30px 20px;position:relative;overflow:hidden;}
.back-btn{position:absolute;right:20px;top:20px;color:#fff;text-decoration:none;font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.15);padding:8px 15px;border-radius:10px;transition:0.2s;z-index:10;}
.back-btn:hover{background:rgba(255,255,255,0.25);}
.main-title{font-size:26px;font-weight:900;color:#fff;margin-top:10px;}

.container{max-width:1100px;margin:30px auto;padding:0 20px 60px;}
.loading{text-align:center;padding:50px;color:#7b3fe4;font-size:18px;font-weight:700;}
.folder-section{margin-bottom:40px;}
.folder-title{background:#fff;padding:15px 20px;border-radius:15px;color:#3d1a6e;font-size:19px;font-weight:900;margin-bottom:20px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 15px rgba(90,45,130,0.08);border-right:6px solid #7b3fe4;}
.folder-title i{color:#7b3fe4;font-size:22px;}

.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:25px;}
.video-card{background:#fff;border-radius:18px;padding:18px;box-shadow:0 4px 15px rgba(0,0,0,0.05);transition:0.3s;cursor:pointer;display:flex;flex-direction:column;gap:15px;border:1px solid #eee;position:relative;overflow:hidden;}
.video-card:hover{transform:translateY(-8px);box-shadow:0 15px 35px rgba(123,63,228,0.18);border-color:#7b3fe4;}
.video-thumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#f8f5ff,#ede3fc);border-radius:12px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.video-thumb i{font-size:45px;color:#b08af0;transition:0.3s;z-index:1;}
.video-card:hover .video-thumb i{color:#7b3fe4;transform:scale(1.15);}
.video-thumb::after{content:'';position:absolute;inset:0;background:rgba(123,63,228,0.03);opacity:0;transition:0.3s;}
.video-card:hover .video-thumb::after{opacity:1;}

.video-info h3{font-size:16px;color:#3d1a6e;font-weight:700;line-height:1.5;height:48px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.video-tag{font-size:11px;background:#f0ecf8;color:#7b3fe4;padding:4px 10px;border-radius:20px;font-weight:700;align-self:flex-start;}

/* Player Overlay */
.player-overlay{position:fixed;inset:0;background:rgba(15,5,30,0.92);z-index:10000;display:none;justify-content:center;align-items:center;padding:20px;backdrop-filter:blur(8px);animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.player-overlay.active{display:flex;}
.player-container{width:100%;max-width:960px;background:#000;border-radius:24px;overflow:hidden;position:relative;box-shadow:0 30px 70px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.1);}
.close-player{position:absolute;top:20px;left:20px;color:#fff;font-size:28px;cursor:pointer;transition:0.2s;z-index:10001;background:rgba(0,0,0,0.5);width:45px;height:45px;display:flex;align-items:center;justify-content:center;border-radius:50%;}
.close-player:hover{background:#ff6b35;transform:rotate(90deg);}
.video-wrapper{position:relative;padding-bottom:56.25%;height:0;}
.video-wrapper iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

footer{text-align:center;padding:30px 20px;color:#999;font-size:14px;border-top:1px solid #e8e2f5;background:#fff;}
footer span{color:#7b3fe4;font-weight:700;}

#app { display: none; }
</style>
<script src="script/auth.js?v=12.0.1"></script>
</head>
<body>

<div id="app">
    <div class="header">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> الرجوع للرئيسية</a>
        <div class="main-title">شروحات WE-Core</div>
    </div>

    <div class="container" id="contentArea">
        <div class="loading" id="loader">
            <i class="fa-solid fa-spinner fa-spin"></i> جاري تحميل الفيديوهات من قاعدة البيانات...
        </div>
    </div>

    <footer>
        Powered by <span>Mohand Hassan</span> · Abassia Store
    </footer>
</div>

<div class="player-overlay" id="playerOverlay" onclick="closePlayer()">
    <i class="fa-solid fa-xmark close-player" onclick="closePlayer()"></i>
    <div class="player-container" onclick="event.stopPropagation()">
        <div class="video-wrapper" id="videoWrapper"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const $ = id => document.getElementById(id);
    const sb = supabase.createClient('https://iygwhapcpdmsasqlfelv.supabase.co', 'sb_publishable_rD9naqrpu1dI-iwchAS0GQ_JkgGysqP');

    async function loadAllVideos() {
        try {
            // Fetch from both tables
            const [res1, res2] = await Promise.all([
                sb.from('Videos').select('*'),
                sb.from('Curces Soft').select('*')
            ]);

            if (res1.error) throw res1.error;
            if (res2.error) throw res2.error;

            // Combine and tag data
            const allVideos = [
                ...res1.data.map(v => ({ ...v, source: 'Videos' })),
                ...res2.data.map(v => ({ ...v, source: 'Curces Soft' }))
            ];

            renderVideos(allVideos);
        } catch (e) {
            console.error(e);
            $('contentArea').innerHTML = '<div class="loading" style="color:#c62828">حدث خطأ أثناء جلب البيانات من Supabase</div>';
        }
    }

    function renderVideos(videos) {
        const area = $('contentArea');
        area.innerHTML = '';

        if (!videos || videos.length === 0) {
            area.innerHTML = '<div class="loading">لا توجد فيديوهات متاحة حالياً في قاعدة البيانات</div>';
            return;
        }

        // Group by folder-name
        const groups = {};
        videos.forEach(v => {
            const folder = v['folder-name'] || 'عام';
            if (!groups[folder]) groups[folder] = [];
            groups[folder].push(v);
        });

        // Sort folders alphabetically
        const sortedFolders = Object.keys(groups).sort();

        sortedFolders.forEach(folder => {
            const section = document.createElement('div');
            section.className = 'folder-section';
            
            let html = `
                <div class="folder-title">
                    <i class="fa-solid fa-folder-open"></i>
                    <span>${folder}</span>
                </div>
                <div class="video-grid">
            `;

            // Sort videos within folder by title
            groups[folder].sort((a, b) => a.title.localeCompare(b.title)).forEach(v => {
                html += `
                    <div class="video-card" onclick="playVideo('${v.file_id}')">
                        <div class="video-thumb">
                            <i class="fa-solid fa-play"></i>
                        </div>
                        <div class="video-info">
                            <div class="video-tag">${v.source === 'Curces Soft' ? 'Soft Skills' : 'BSS Tutorial'}</div>
                            <h3>${v.title}</h3>
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            section.innerHTML = html;
            area.appendChild(section);
        });
    }

    window.playVideo = function(fileId) {
        const wrapper = $('videoWrapper');
        // Drive preview link for better embedding
        const driveEmbed = `https://drive.google.com/file/d/${fileId}/preview`;
        
        wrapper.innerHTML = `<iframe src="${driveEmbed}" allow="autoplay" allowfullscreen></iframe>`;
        $('playerOverlay').classList.add('active');
        document.body.style.overflow = 'hidden'; // Prevent scrolling
    };

    window.closePlayer = function() {
        $('playerOverlay').classList.remove('active');
        $('videoWrapper').innerHTML = '';
        document.body.style.overflow = ''; // Restore scrolling
    };

    // Initial check and load
    window.addEventListener('load', () => {
        const savedUser = sessionStorage.getItem('we_user');
        if (savedUser) {
            $('app').style.display = 'block';
            loadAllVideos();
        }
    });
})();
</script>

<script src="script/active-users-widget.js"></script>
<script>
    window.addEventListener('load', function() {
        if (typeof ActiveUsersWidget !== 'undefined') {
            ActiveUsersWidget.init({ position: 'corner' });
        }
    });
</script>

</body>
</html>
