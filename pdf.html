<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="script/auth.js?v=12.0.1"></script> <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النماذج | WE-Core</title>
    <link rel="shortcut icon" href="img/we-core.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style/pdf.css">
</head>
<body>
    <header class="header">
        <nav class="navbar">
            <a href="index.html" class="logo-wrapper">
                <img src="img/we-core.png" alt="WE-Core" class="logo">
                <div class="logo-text">
                    <span class="logo-title">WE-Core</span>
                    <span class="logo-sub">بواسطة مهند حسن</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html"><i class="fa-solid fa-house-user"></i> الرئيسية</a>
            </div>
        </nav>
    </header>

    <section class="forms-section" id="forms">
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="ابحث عن نموذج...">
            <button class="filter-btn" onclick="searchForms()">بحث</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn" onclick="filterForms('all')">الكل</button>
            <button class="filter-btn" onclick="filterForms('Mobile')">المحمول</button>
            <button class="filter-btn" onclick="filterForms('Fixed')">الأرضي</button>
            <button class="filter-btn" onclick="filterForms('Adsl')">إنتـرنت</button>
        </div>

        <div class="forms-grid" id="formsContainer">
            <div class="loader">جاري تحميل النماذج...</div>
        </div>
    </section>

    <footer class="footer">
        <p>Powered by Mohand Hassan | 2026</p>
    </footer>

    <script type="module" src="script/pdf.js"></script>
    <script src="script/active-users-widget.js"></script>
</body>
</html>
