<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عرض النموذج</title>
  <link rel="shortcut icon" href="img/we-core.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    :root {
      --purple: #6a1b9a;
      --purple-bg: #f8f0ff;
      --toolbar-h: 56px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Tahoma, Arial, sans-serif;
      background: var(--purple-bg);
      min-height: 100vh;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 100;
      height: var(--toolbar-h);
      background: var(--purple);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }

    .title {
      flex: 1;
      color: #fff;
      font-size: 15px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tb-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,.3);
      padding: 7px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
    }

    .tb-btn:hover {
      background: rgba(255,255,255,.28);
    }

    #viewerContainer {
      height: calc(100vh - var(--toolbar-h));
      width: 100%;
    }

    #pdfFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #fff;
    }

    @media print {
      .toolbar {
        display: none !important;
      }

      #viewerContainer {
        height: 100vh;
      }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="tb-btn" href="pdf.html">
      <i class="fas fa-arrow-right"></i> رجوع
    </a>

    <span class="title" id="docTitle">جاري التحميل...</span>

    <button class="tb-btn" onclick="printPDF()">
      <i class="fas fa-print"></i> طباعة
    </button>

    <button class="tb-btn" onclick="downloadPDF()">
      <i class="fas fa-download"></i> تحميل
    </button>
  </div>

  <div id="viewerContainer">
    <iframe id="pdfFrame"></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const fileUrl = params.get("src");

    const frame = document.getElementById("pdfFrame");
    const title = document.getElementById("docTitle");

    if (fileUrl) {
      frame.src = fileUrl;

      const fileName = fileUrl.split("/").pop().split("?")[0];
      title.textContent = decodeURIComponent(fileName).replace(/\.pdf$/i, "");
    } else {
      title.textContent = "لم يتم العثور على الملف";
    }

    function printPDF() {
      const printWindow = window.open(fileUrl, "_blank");
      printWindow.onload = function () {
        printWindow.print();
      };
    }

    function downloadPDF() {
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = "";
      a.target = "_blank";
      a.click();
    }
  </script>

</body>
</html>
