<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <script src="script/auth.js?v=15.0.1"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عرض النموذج</title>
  <link rel="shortcut icon" href="img/we-core.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4a148c;
      --primary-light: #7b1fa2;
      --primary-dark: #2d0060;
      --accent: #e040fb;
      --accent-soft: rgba(224, 64, 251, 0.15);
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --toolbar-h: 64px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', Tahoma, sans-serif;
      background: #0d0015;
      min-height: 100vh;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(106,27,154,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(74,20,140,0.4) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(224,64,251,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--toolbar-h);
      background: rgba(13, 0, 21, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
    }

    .btn-back {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass);
      color: #e0b0ff;
      border: 1px solid var(--glass-border);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      text-decoration: none;
      transition: all 0.2s;
    }

    .title-wrap { flex: 1; display: flex; align-items: center; gap: 10px; min-width: 0; }
    .file-icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      display: flex; align-items: center; justify-content: center; color: #fff;
      box-shadow: 0 0 14px rgba(224,64,251,0.35);
    }

    .doc-title { color: #f0e0ff; font-size: 15px; font-weight: 700; }

    .actions { display: flex; gap: 8px; }
    .tb-btn {
      display: flex; align-items: center; gap: 6px; background: var(--glass);
      color: #e0b0ff; border: 1px solid var(--glass-border); padding: 9px 15px;
      border-radius: 10px; cursor: pointer; font-size: 13px; font-family: 'Cairo';
    }
    .tb-btn.primary {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      border-color: transparent; color: #fff;
    }

    #viewerContainer { position: relative; height: calc(100vh - var(--toolbar-h)); width: 100%; }
    #pdfFrame { width: 100%; height: 100%; border: none; background: #1a1a2e; }

    #loadingScreen {
      position: absolute; inset: 0; background: rgba(13,0,21,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    #loadingScreen.hidden { opacity: 0; pointer-events: none; }
    .spinner { width: 48px; height: 48px; border: 3px solid rgba(224,64,251,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media print { .toolbar { display: none !important; } }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="btn-back" href="pdf.html">
      <i class="fas fa-arrow-right"></i>
      <span>رجوع</span>
    </a>

    <div class="title-wrap">
      <div class="file-icon"><i class="fas fa-file-pdf"></i></div>
      <span class="doc-title" id="docTitle">جاري التحميل...</span>
    </div>

    <div class="actions">
      <button class="tb-btn" onclick="printPDF()">
        <i class="fas fa-print"></i>
        <span>طباعة</span>
      </button>
      <button class="tb-btn primary" onclick="downloadPDF()">
        <i class="fas fa-download"></i>
        <span>تحميل</span>
      </button>
    </div>
  </div>

  <div id="viewerContainer">
    <div id="loadingScreen">
      <div class="spinner"></div>
      <p style="color: #c080ff;">جاري تحميل النموذج...</p>
    </div>
    <iframe id="pdfFrame"></iframe>
  </div>

  <script>
    function getCookie(name) {
        const value = `; ${document.cookie}`;
        const parts = value.split(`; ${name}=`);
        if (parts.length === 2) return parts.pop().split(';').shift();
    }

    const params = new URLSearchParams(window.location.search);
    let fileUrl = params.get("src");
    const frame = document.getElementById("pdfFrame");
    const titleEl = document.getElementById("docTitle");
    const loading = document.getElementById("loadingScreen");
    let localBlobUrl = null;

    if (fileUrl) {
      const fileName = decodeURIComponent(fileUrl.split("/").pop().split("?")[0]);
      titleEl.textContent = fileName.replace(/\.pdf$/i, "");
      
      const token = getCookie('sb-access-token');

      // حل مشكلة headers must have required property 'authorization'
      if (token && fileUrl.includes('/authenticated/')) {
          fetch(fileUrl, {
              headers: { "Authorization": `Bearer ${token}` }
          })
          .then(res => {
              if(!res.ok) throw new Error("Authorization Required");
              return res.blob();
          })
          .then(blob => {
              localBlobUrl = URL.createObjectURL(blob);
              frame.src = localBlobUrl;
          })
          .catch(err => {
              console.error(err);
              loading.classList.add("hidden");
              titleEl.textContent = "خطأ في صلاحية الوصول";
          });
      } else {
          frame.src = fileUrl;
          localBlobUrl = fileUrl;
      }

      frame.onload = () => setTimeout(() => loading.classList.add("hidden"), 400);
    }

    // جعل Ctrl + P يطبع الملف فقط
    window.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'p') {
            e.preventDefault();
            printPDF();
        }
    });

    function printPDF() {
        if (frame.contentWindow) {
            frame.contentWindow.focus();
            frame.contentWindow.print();
        } else if (localBlobUrl) {
            const w = window.open(localBlobUrl, "_blank");
            w.onload = () => w.print();
        }
    }

    function downloadPDF() {
      if (!localBlobUrl) return;
      const a = document.createElement("a");
      a.href = localBlobUrl;
      a.download = decodeURIComponent(fileUrl.split("/").pop());
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }
  </script>
</body>
</html>
