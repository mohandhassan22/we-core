<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script src="script/auth.js"></script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>عرض النموذج</title>
  <link rel="shortcut icon" href="img/we-core.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4a148c;
      --primary-light: #7b1fa2;
      --primary-dark: #2d0060;
      --accent: #e040fb;
      --accent-soft: rgba(224, 64, 251, 0.15);
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --toolbar-h: 64px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Cairo', Tahoma, sans-serif;
      background: #0d0015;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── خلفية متحركة ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 0%, rgba(106,27,154,0.5) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(74,20,140,0.4) 0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(224,64,251,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── شبكة خفيفة ─── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Toolbar ─── */
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 200;
      height: var(--toolbar-h);
      background: rgba(13, 0, 21, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--glass-border);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      animation: slideDown 0.4s ease;
    }

    @keyframes slideDown {
      from { transform: translateY(-100%); opacity: 0; }
      to   { transform: translateY(0);     opacity: 1; }
    }

    /* ─── زر رجوع ─── */
    .btn-back {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass);
      color: #e0b0ff;
      border: 1px solid var(--glass-border);
      padding: 9px 16px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-back:hover {
      background: rgba(224,64,251,0.15);
      border-color: var(--accent);
      color: #fff;
    }
    .btn-back i { font-size: 12px; }

    /* ─── عنوان الملف ─── */
    .title-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .file-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      flex-shrink: 0;
      box-shadow: 0 0 14px rgba(224,64,251,0.35);
    }

    .doc-title {
      color: #f0e0ff;
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── أزرار الأدوات ─── */
    .actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .tb-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--glass);
      color: #e0b0ff;
      border: 1px solid var(--glass-border);
      padding: 9px 15px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Cairo', sans-serif;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .tb-btn:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
      transform: translateY(-1px);
    }
    .tb-btn.primary {
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 4px 14px rgba(224,64,251,0.3);
    }
    .tb-btn.primary:hover {
      box-shadow: 0 6px 20px rgba(224,64,251,0.5);
      transform: translateY(-2px);
    }

    /* ─── حاوية PDF ─── */
    #viewerContainer {
      position: relative;
      z-index: 1;
      height: calc(100vh - var(--toolbar-h));
      width: 100%;
      display: flex;
      align-items: stretch;
      animation: fadeIn 0.5s ease 0.2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #pdfFrame {
      width: 100%;
      height: 100%;
      border: none;
      background: #1a1a2e;
    }

    /* ─── شاشة تحميل ─── */
    #loadingScreen {
      position: absolute;
      inset: 0;
      background: rgba(13,0,21,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 10;
      transition: opacity 0.5s;
    }
    #loadingScreen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(224,64,251,0.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #loadingScreen p {
      color: #c080ff;
      font-size: 14px;
      font-family: 'Cairo', sans-serif;
    }

    /* ─── رسالة خطأ ─── */
    .error-state {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #a070c0;
    }
    .error-state i {
      font-size: 52px;
      color: rgba(224,64,251,0.4);
    }
    .error-state p {
      font-size: 15px;
      font-family: 'Cairo', sans-serif;
    }

    /* ─── موبايل ─── */
    @media (max-width: 600px) {
      .toolbar { padding: 0 12px; gap: 8px; }
      .tb-btn span { display: none; }
      .tb-btn { padding: 9px 12px; }
      .btn-back span { display: none; }
    }

    @media print {
      .toolbar { display: none !important; }
      #viewerContainer { height: 100vh; }
    }
  </style>
</head>
<body>

  <div class="toolbar">
    <a class="btn-back" href="pdf.html">
      <i class="fas fa-arrow-right"></i>
      <span>رجوع</span>
    </a>

    <div class="title-wrap">
      <div class="file-icon">
        <i class="fas fa-file-pdf"></i>
      </div>
      <span class="doc-title" id="docTitle">جاري التحميل...</span>
    </div>

    <div class="actions">
      <button class="tb-btn" onclick="printPDF()">
        <i class="fas fa-print"></i>
        <span>طباعة</span>
      </button>
      <button class="tb-btn primary" onclick="downloadPDF()">
        <i class="fas fa-download"></i>
        <span>تحميل</span>
      </button>
    </div>
  </div>

  <div id="viewerContainer">
    <div id="loadingScreen">
      <div class="spinner"></div>
      <p>جاري تحميل النموذج...</p>
    </div>
    <iframe id="pdfFrame"></iframe>
  </div>

  <script>
    const params  = new URLSearchParams(window.location.search);
    const fileUrl = params.get("src");
    const frame   = document.getElementById("pdfFrame");
    const titleEl = document.getElementById("docTitle");
    const loading = document.getElementById("loadingScreen");

    if (fileUrl) {
      const fileName = decodeURIComponent(fileUrl.split("/").pop().split("?")[0]);
      titleEl.textContent = fileName.replace(/\.pdf$/i, "");
      document.title = fileName.replace(/\.pdf$/i, "") + " | WE-Core";

      frame.src = fileUrl;
      frame.onload = () => {
        setTimeout(() => loading.classList.add("hidden"), 400);
      };
      // fallback لو onload ماتشغلش
      setTimeout(() => loading.classList.add("hidden"), 5000);
    } else {
      loading.classList.add("hidden");
      titleEl.textContent = "لم يتم تحديد ملف";
      frame.style.display = "none";
      document.getElementById("viewerContainer").innerHTML = `
        <div class="error-state">
          <i class="fas fa-exclamation-circle"></i>
          <p>لم يتم العثور على الملف</p>
        </div>`;
    }

    function printPDF() {
      if (!fileUrl) return;
      const w = window.open(fileUrl, "_blank");
      if (w) w.onload = () => w.print();
    }

    function downloadPDF() {
      if (!fileUrl) return;
      const a = document.createElement("a");
      a.href = fileUrl;
      a.download = decodeURIComponent(fileUrl.split("/").pop());
      a.target = "_blank";
      a.click();
    }
  </script>

</body>
</html>
