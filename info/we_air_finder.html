<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تحديد مناطق تشغيل we air</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      color: white;
      margin-bottom: 40px;
      padding-top: 20px;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }

    header p {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .stat-item {
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .stat-item .number {
      font-size: 2em;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }

    .stat-item .label {
      color: #666;
      font-size: 0.9em;
    }

    .search-box {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    .search-box h2 {
      margin-bottom: 20px;
      color: #333;
      font-size: 1.3em;
    }

    .search-controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 200px;
      padding: 12px 15px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 600;
    }

    .btn-search {
      background: #667eea;
      color: white;
    }

    .btn-search:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-gps {
      background: #f0f0f0;
      color: #333;
      padding: 12px 15px;
    }

    .btn-gps:hover {
      background: #e0e0e0;
    }

    .status-message {
      padding: 12px 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
      animation: slideIn 0.3s ease;
    }

    .status-message.show {
      display: block;
    }

    .status-message.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status-message.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status-message.loading {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .results-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .results-section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.3em;
    }

    .cards-container {
      display: grid;
      gap: 15px;
    }

    .station-card {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 20px;
      border-radius: 8px;
      transition: all 0.3s;
      animation: cardIn 0.5s ease;
    }

    .station-card:hover {
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transform: translateX(5px);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }

    .station-name {
      font-size: 1.2em;
      font-weight: 600;
      color: #333;
    }

    .station-code {
      color: #764ba2;
      font-weight: bold;
      font-size: 0.95em;
      margin-top: 5px;
    }

    .card-details {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95em;
    }

    .detail-label {
      color: #666;
    }

    .detail-value {
      color: #333;
      font-weight: 500;
    }

    .status-badge {
      padding: 4px 10px;
      border-radius: 15px;
      font-size: 0.85em;
      font-weight: 600;
    }

    .status-active {
      background: #e6fffa;
      color: #2d3748;
    }

    footer {
      text-align: center;
      color: white;
      margin-top: 40px;
      padding-bottom: 20px;
      font-size: 0.9em;
      opacity: 0.8;
    }

    @media (max-width: 600px) {
      .search-controls {
        flex-direction: column;
      }
      button {
        width: 100%;
      }
      header h1 {
        font-size: 1.8em;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>تحديد مناطق تشغيل we air</h1>
      <p>ابحث عن أقرب محطة تقوية لخدمة we air في منطقتك</p>
    </header>

    <div class="stats">
      <div class="stat-item">
        <div class="number" id="total-stations">0</div>
        <div class="label">إجمالي المحطات</div>
      </div>
      <div class="stat-item">
        <div class="number">4G/5G</div>
        <div class="label">تقنية التغطية</div>
      </div>
    </div>

    <div class="search-box">
      <h2>ابحث عن منطقتك</h2>
      <div class="search-controls">
        <input type="text" id="search-input" placeholder="أدخل اسم المنطقة أو المدينة (مثال: المعادي)...">
        <button class="btn-search" onclick="searchStations()">بحث</button>
        <button class="btn-gps" onclick="getLocation()">
          <span id="gps-text">📍 موقعي الحالي</span>
        </button>
      </div>
      <div id="status-msg" class="status-message"></div>
    </div>

    <div class="results-section">
      <h2 id="results-title">المحطات القريبة</h2>
      <div id="results-container" class="cards-container">
        <!-- النتائج ستظهر هنا -->
      </div>
    </div>

    <footer>
      &copy; 2024 جميع الحقوق محفوظة - we air finder
    </footer>
  </div>

  <script>
    // بيانات المحطات
    const stations = [
      { id: 1, name: "محطة مدينة نصر 1", code: "CAI-MN1", address: "شارع عباس العقاد، مدينة نصر", lat: 30.0596, lng: 31.3400, type: "4G/5G", status: "نشط" },
      { id: 2, name: "محطة المعادي", code: "CAI-MAA", address: "شارع 9، المعادي", lat: 29.9602, lng: 31.2569, type: "4G", status: "نشط" },
      { id: 3, name: "محطة التجمع الخامس", code: "NCA-TJG", address: "شارع التسعين، التجمع الخامس", lat: 30.0221, lng: 31.4847, type: "5G", status: "نشط" },
      { id: 4, name: "محطة الدقي", code: "GIZ-DQ", address: "شارع التحرير، الدقي", lat: 30.0371, lng: 31.2114, type: "4G", status: "نشط" },
      { id: 5, name: "محطة سموحة", code: "ALX-SMH", address: "شارع فوزي معاذ، سموحة، الإسكندرية", lat: 31.2184, lng: 29.9416, type: "4G/5G", status: "نشط" },
      { id: 6, name: "محطة الشيخ زايد", code: "GIZ-SZ", address: "هايبر وان، الشيخ زايد", lat: 30.0150, lng: 30.9822, type: "5G", status: "نشط" },
      { id: 7, name: "محطة وسط البلد", code: "CAI-CTR", address: "ميدان التحرير، القاهرة", lat: 30.0444, lng: 31.2357, type: "4G", status: "نشط" },
      { id: 8, name: "محطة المنصورة", code: "DKH-MAN", address: "شارع المشاية، المنصورة", lat: 31.0450, lng: 31.3785, type: "4G", status: "نشط" }
    ];

    document.getElementById('total-stations').textContent = stations.length;

    // دالة البحث النصي المحسنة
    async function searchStations() {
      const query = document.getElementById('search-input').value.trim();
      if (!query) {
        showStatus('يرجى إدخال اسم المنطقة للبحث', 'error');
        return;
      }

      showStatus('جاري البحث عن الموقع...', 'loading');

      try {
        // محاولة البحث أولاً في أسماء المحطات المخزنة محلياً
        const localResults = stations.filter(s => 
          s.name.includes(query) || 
          s.address.includes(query) ||
          s.code.includes(query)
        );

        // استخدام Nominatim API لتحويل العنوان إلى إحداثيات للبحث عن الأقرب
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query + " Egypt")}&limit=1`);
        const data = await response.json();

        if (data && data.length > 0) {
          const lat = parseFloat(data[0].lat);
          const lon = parseFloat(data[0].lon);
          findNearestStations(lat, lon, `نتائج البحث عن: ${query}`);
          showStatus(`تم العثور على موقع "${query}" وعرض أقرب المحطات`, 'success');
        } else if (localResults.length > 0) {
          displayResults(localResults);
          showStatus(`تم العثور على ${localResults.length} محطة مطابقة للبحث`, 'success');
        } else {
          showStatus('لم يتم العثور على هذا الموقع، حاول كتابة اسم المدينة أو الحي بشكل أوضح', 'error');
        }
      } catch (error) {
        console.error(error);
        // في حالة فشل الـ API، نعتمد على البحث النصي المحلي فقط
        const filtered = stations.filter(s => 
          s.name.includes(query) || s.address.includes(query)
        );
        if (filtered.length > 0) {
          displayResults(filtered);
          showStatus('نتائج البحث المحلي (قد لا تكون دقيقة بالمسافة)', 'success');
        } else {
          showStatus('حدث خطأ أثناء البحث، يرجى المحاولة لاحقاً', 'error');
        }
      }
    }

    function getLocation() {
      const gpsText = document.getElementById('gps-text');
      if (!navigator.geolocation) {
        showStatus('متصفحك لا يدعم تحديد الموقع', 'error');
        return;
      }

      gpsText.textContent = "⌛ جاري تحديد موقعك...";
      showStatus('جاري طلب الوصول لموقعك...', 'loading');

      // إعدادات محسنة للـ GPS
      const options = {
        enableHighAccuracy: true,
        timeout: 10000,
        maximumAge: 0
      };

      navigator.geolocation.getCurrentPosition(
        (position) => {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          gpsText.textContent = "📍 موقعي الحالي";
          showStatus('تم تحديد موقعك بنجاح', 'success');
          findNearestStations(lat, lng, 'أقرب المحطات لموقعك الحالي');
        },
        (error) => {
          gpsText.textContent = "📍 موقعي الحالي";
          let msg = 'تعذر الحصول على موقعك';
          if (error.code === 1) msg = 'يرجى السماح بالوصول للموقع من إعدادات المتصفح';
          else if (error.code === 3) msg = 'انتهت مهلة تحديد الموقع، حاول مرة أخرى';
          showStatus(msg, 'error');
        },
        options
      );
    }

    function calculateDistance(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = 
        Math.sin(dLat/2) * Math.sin(dLat/2) +
        Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * 
        Math.sin(dLon/2) * Math.sin(dLon/2);
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
      return R * c;
    }

    function findNearestStations(lat, lng, titleText) {
      const stationsWithDistance = stations.map(s => ({
        ...s,
        distance: calculateDistance(lat, lng, s.lat, s.lng)
      }));

      stationsWithDistance.sort((a, b) => a.distance - b.distance);
      displayResults(stationsWithDistance.slice(0, 5), titleText);
    }

    function displayResults(results, titleText = 'نتائج البحث') {
      const container = document.getElementById('results-container');
      const title = document.getElementById('results-title');
      
      container.innerHTML = '';
      title.textContent = titleText;

      results.forEach(station => {
        const card = document.createElement('div');
        card.className = 'station-card';
        
        let distanceHtml = '';
        if (station.distance !== undefined) {
          distanceHtml = `
            <div class="detail-row">
              <span class="detail-label">المسافة:</span>
              <span class="detail-value">${station.distance.toFixed(2)} كم تقريباً</span>
            </div>
          `;
        }

        card.innerHTML = `
          <div class="card-header">
            <span class="station-name">${station.name}</span>
            <span class="status-badge status-active">${station.status}</span>
          </div>
          <div class="station-code">كود: ${station.code}</div>
          <div class="card-details">
            <div class="detail-row">
              <span class="detail-label">العنوان:</span>
              <span class="detail-value">${station.address}</span>
            </div>
            <div class="detail-row">
              <span class="detail-label">نوع التغطية:</span>
              <span class="detail-value">${station.type}</span>
            </div>
            ${distanceHtml}
            <div style="margin-top: 10px; text-align: left;">
              <a href="https://www.google.com/maps/dir/?api=1&destination=${station.lat},${station.lng}" target="_blank" style="color: #667eea; text-decoration: none; font-size: 0.9em; font-weight: bold;">🗺️ عرض الاتجاهات</a>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function showStatus(text, type) {
      const msg = document.getElementById('status-msg');
      msg.textContent = text;
      msg.className = `status-message show ${type}`;
    }

    document.getElementById('search-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') {
        searchStations();
      }
    });
  </script>
</body>
</html>
