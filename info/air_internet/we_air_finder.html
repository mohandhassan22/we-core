<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
        <script src="../../assets/js/auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام النطاق التشغيلي الفعلي - WE-Air</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../../assets/js/active-users-widget.js"></script>
    <link rel="stylesheet" href="css/we_air_finder.css">
</head>
<body>

<div class="container">
  <header>
    <img src="https://we-core.icu/img/we-core.png" alt="we core logo" style="height:52px;width:auto;margin-bottom:1.2rem;display:block;margin-left:auto;margin-right:auto;" onerror="this.style.display='none'">
    <div class="badge">خدمة we core — تغطية الشبكة</div>
    <h1>تحديد مناطق تشغيل we air</h1>
    <p class="subtitle">اكتشف أقرب نقاط تغطية خدمة we air في جميع أنحاء جمهورية مصر العربية</p>
     <a href="../prepaid.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> رجوع</a>
 <!-- NOTE -->
    <div class="note-box">
        <i class="fa-solid fa-triangle-exclamation"></i>
        جميع النتائج تقريبه ليست دقيقه في جميع الاوقات .
    </div>
  </header>

  <div class="stats-bar">
    <div class="stat">
      <span class="stat-num" id="stations-count">0</span>
      <span class="stat-label">قسم مسجّل</span>
    </div>
    <div class="stat">
      <span class="stat-num">27</span>
      <span class="stat-label">محافظة</span>
    </div>
    <div class="stat">
      <span class="stat-num">⚡</span>
      <span class="stat-label">بحث فوري</span>
    </div>
  </div>

  <div class="search-card">
    <label class="search-label" for="address-input">🔍 أدخل عنوانك أو اضغط زر GPS لتحديد موقعك تلقائياً</label>

    <div class="input-wrap">
      <input type="text" id="address-input" placeholder="مثال: المعادي، القاهرة  أو  طنطا، الغربية" />
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="search-btn" onclick="searchByText()">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
          <circle cx="12" cy="9" r="2.5"/>
        </svg>
        ابحث عن أقرب منطقة تغطية
      </button>
      <button class="btn btn-gps" id="gps-btn" onclick="locateByGPS()" title="تحديد موقعي بالـ GPS">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
          <circle cx="12" cy="12" r="8" stroke-dasharray="3 2"/>
        </svg>
        GPS
      </button>
    </div>

    <div id="status"></div>
    <div id="location-chip">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
      <span id="location-text"></span>
    </div>
  </div>

  <div id="results">
    <div class="results-title">أقرب نقاط تغطية we air</div>
    <div id="cards-container"></div>
  </div>

  <footer>
    <img src="https://we-core.icu/img/we-core.png" alt="we core" class="footer-logo" onerror="this.style.display='none'">
    we core team 2026 · https://we-core.icu/
  </footer>
</div>
