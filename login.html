<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE-Core | تسجيل الدخول</title>
    <link rel="shortcut icon" href="img/we-core.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Cairo', sans-serif; background: #f0ecf8; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .login-modal { background: #fff; padding: 40px 32px 32px; border-radius: 22px; width: 100%; max-width: 390px; text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.15); border-top: 5px solid #7b3fe4; }
        .modal-logo { width: 80px; height: 80px; border-radius: 50%; border: 3px solid #ede3fc; margin: 0 auto 16px; object-fit: cover; }
        h3 { color: #3d1a6e; font-size: 24px; font-weight: 900; margin-bottom: 6px; }
        .sub { color: #aaa; font-size: 14px; margin-bottom: 28px; }
        .field { position: relative; margin-bottom: 16px; }
        .field i { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #b08af0; }
        .field input { width: 100%; padding: 14px 44px 14px 14px; border: 2px solid #ede3fc; border-radius: 12px; font-family: 'Cairo'; outline: none; background: #faf8ff; text-align: right; }
        .field input:focus { border-color: #7b3fe4; background: #fff; }
        .login-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg,#7b3fe4,#a066f5); color: #fff; font-weight: 700; cursor: pointer; margin-top: 6px; }
        .err { color: #c62828; font-size: 13px; margin-top: 14px; background: #fff5f5; padding: 10px; border-radius: 10px; border: 1px solid #ffcdd2; display: none; }
        .err.show { display: block; }
    </style>
</head>
<body>

<div class="login-modal">
    <img src="img/we-core.png" class="modal-logo" alt="WE-Core">
    <h3>WE-Core</h3>
    <p class="sub">سجّل دخولك للمتابعة</p>
    <div class="field">
        <i class="fa-solid fa-user"></i>
        <input id="uname" type="text" placeholder="اسم المستخدم" autocomplete="off">
    </div>
    <div class="field">
        <i class="fa-solid fa-lock"></i>
        <input id="upass" type="password" placeholder="كلمة المرور">
    </div>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">
        تسجيل الدخول
    </button>
    <div class="err" id="errMsg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
(function() {
    const $ = id => document.getElementById(id);
    const showErr = msg => { $('errMsg').textContent = msg; $('errMsg').classList.add('show'); };
    
    const sb = supabase.createClient(
        'https://iygwhapcpdmsasqlfelv.supabase.co',
        'sb_publishable_rD9naqrpu1dI-iwchAS0GQ_JkgGysqP',
        { auth: { persistSession: true, autoRefreshToken: true } }
    );

    window.doLogin = async function() {
        const username = $('uname').value.trim();
        const password = $('upass').value;
        if (!username || !password) return showErr('أدخل البيانات كاملة');
        
        const btn = $('loginBtn');
        btn.disabled = true;
        btn.innerHTML = 'جاري التحقق...';

        try {
            // 1. جلب الإيميل من الـ Edge Function
            const { data: emailData, error: emailErr } = await sb.functions.invoke('hyper-task', {
                body: { action: 'get_email', username: username }
            });

            if (emailErr || !emailData?.email) throw new Error('المستخدم غير موجود');

            // 2. Auth
            const { data, error } = await sb.auth.signInWithPassword({
                email: emailData.email,
                password: password
            });

            if (error) throw error;

            // 3. Cookie للـ Edge Functions (اختياري)
            document.cookie = `sb-access-token=${data.session.access_token}; path=/; max-age=86400; SameSite=Lax`;
            
            // 4. التحويل لصفحة Index
            window.location.href = 'index.html';

        } catch (e) {
            btn.disabled = false;
            btn.innerHTML = 'تسجيل الدخول';
            showErr(e.message === 'المستخدم غير موجود' ? e.message : 'بيانات الدخول غير صحيحة');
        }
    };
})();
</script>
</body>
</html>
