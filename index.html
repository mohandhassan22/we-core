<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WE-Core | تسجيل الدخول</title>
    <link rel="shortcut icon" href="img/we-core.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        body {
            margin: 0;
            font-family: 'Cairo', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            direction: rtl;
        }

        .login-container {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            width: 100px;
            margin-bottom: 20px;
        }

        h2 {
            color: #5a2d82;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: right;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #666;
            font-size: 14px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        .input-group input:focus {
            border-color: #5a2d82;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #5a2d82;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        .login-btn:hover {
            background: #4a246a;
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .error-msg {
            color: #dc3545;
            font-size: 14px;
            margin-top: 15px;
            display: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
<script src="script/active-users-widget.js"></script>
</head>
<body>

    <div class="login-container">
        <img src="img/we-core.png" alt="Logo" class="logo">
        <h2>تسجيل الدخول</h2>
        
        <div class="input-group">
            <label>اسم المستخدم</label>
            <input type="text" id="username" placeholder="أدخل اسم المستخدم">
        </div>

        <div class="input-group">
            <label>كلمة المرور</label>
            <input type="password" id="password" placeholder="أدخل كلمة المرور">
        </div>

        <button class="login-btn" id="loginBtn" onclick="doLogin()">
            <span id="btnText">دخول</span>
            <div class="loading-spinner" id="spinner"></div>
        </button>

        <div class="error-msg" id="errorMsg"></div>
    </div>

    <script>
        const SB_URL = 'https://iygwhapcpdmsasqlfelv.supabase.co';
        const SB_KEY = 'sb_publishable_rD9naqrpu1dI-iwchAS0GQ_JkgGysqP';
        
        // تعديل: تعطيل الحفظ التلقائي في LocalStorage
        const sb = supabase.createClient(SB_URL, SB_KEY, {
            auth: {
                persistSession: false,
                autoRefreshToken: false,
                detectSessionInUrl: false
            }
        });

        async function doLogin() {
            const usernameInput = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            const errorMsg = document.getElementById('errorMsg');

            if (!usernameInput || !password) {
                showErr('يرجى إدخال اسم المستخدم وكلمة المرور');
                return;
            }

            btn.disabled = true;
            btnText.style.display = 'none';
            spinner.style.display = 'block';
            errorMsg.style.display = 'none';

            try {
                // تصحيح: استدعاء Edge Function بدلاً من RPC لحل مشكلة الـ 404
                const { data: emailData, error: emailErr } = await sb.functions.invoke('hyper-task', {
                    body: { action: 'get_email', username: usernameInput }
                });

                if (emailErr || !emailData?.email) {
                    throw new Error('اسم المستخدم غير موجود');
                }

                const userEmail = emailData.email;

                // 2. تسجيل الدخول
                const { data: auth, error: aError } = await sb.auth.signInWithPassword({
                    email: userEmail,
                    password: password
                });

                if (aError || !auth.session) {
                    throw new Error('كلمة المرور غير صحيحة');
                }

                // 3. تخزين الـ Token في الكوكيز فقط
                const token = auth.session.access_token;
                document.cookie = `sb-access-token=${token}; path=/; max-age=604800; SameSite=Lax`;

                sessionStorage.setItem('we_user', usernameInput);
                window.location.replace('Tutorial.html');

            } catch (err) {
                showErr(err.message);
                btn.disabled = false;
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }
        }

        function showErr(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';
        }

        async function checkSession() {
            // التحقق من الكوكيز بدلاً من getSession (لأن LocalStorage معطل)
            const getCookie = (name) => {
                const value = `; ${document.cookie}`;
                const parts = value.split(`; ${name}=`);
                if (parts.length === 2) return parts.pop().split(';').shift();
            };
            
            const token = getCookie('sb-access-token');
            if (token) {
                const { data: { user } } = await sb.auth.getUser(token);
                if (user) {
                    window.location.replace('Tutorial.html');
                }
            }
        }

        window.onload = () => {
            checkSession();
            if (typeof ActiveUsersWidget !== 'undefined') {
                ActiveUsersWidget.init({ position: 'corner' });
            }
        };
    </script>
</body>
</html>
