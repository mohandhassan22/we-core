<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعادة تعيين كلمة المرور</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/Reset-Password.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="card" id="main-card">

  <!-- Confetti container -->
  <div class="confetti-wrap" id="confetti-wrap"></div>

  <div class="logo-wrap">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <div class="logo-title"><span>WE</span>‑Core</div>
    <div class="logo-sub">إعادة تعيين كلمة المرور</div>
  </div>

  <!-- Session loader -->
  <div id="session-loader">
    <div class="mini-spin"></div>
    <span>جارٍ التحقق من الرابط...</span>
  </div>

  <!-- Form -->
  <div id="form-body" style="display:none">
    <label for="password">كلمة المرور الجديدة</label>
    <div class="input-group">
      <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <input type="password" id="password" placeholder="أدخل كلمة مرور قوية"
             autocomplete="new-password" oninput="checkStrength(this.value)">
      <button class="toggle-eye" type="button" onclick="toggleVis('password', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <div class="strength-wrap">
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="strength-label" id="strength-label"></div>
    </div>

    <div class="req-list">
      <span class="req" id="req-len"><span class="req-dot"></span>٨ أحرف على الأقل</span>
      <span class="req" id="req-upper"><span class="req-dot"></span>حرف كبير</span>
      <span class="req" id="req-num"><span class="req-dot"></span>رقم</span>
      <span class="req" id="req-sym"><span class="req-dot"></span>رمز خاص</span>
    </div>

    <label for="confirm">تأكيد كلمة المرور</label>
    <div class="input-group">
      <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
      </svg>
      <input type="password" id="confirm" placeholder="أعد إدخال كلمة المرور" autocomplete="new-password">
      <button class="toggle-eye" type="button" onclick="toggleVis('confirm', this)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="resetPassword()">
      <span class="btn-text" id="btn-text">تحديث كلمة المرور</span>
      <div class="spinner" id="spinner"></div>
    </button>
  </div>

  <!-- Success overlay -->
  <div class="success-overlay" id="success-overlay">
    <div class="success-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <div class="success-title">تم تغيير كلمة المرور!</div>
    <div class="success-sub">
      تم تحديث كلمة مرورك بنجاح.<br>
      يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.
    </div>
    <div class="success-badge">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      حسابك محمي الآن
    </div>
  </div>

  <p id="message"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/Reset-Password.js"></script>

<footer style="text-align: center; padding: 20px; border-top: 1px solid #ddd;">WE Core Team 2026</footer>
<script src="assets/js/active-users-widget.js"></script>
</body>
</html>
