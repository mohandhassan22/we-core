<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WE Core BSS — مكتبة الفيديوهات</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple:       #7C3AED;
    --purple-mid:   #A78BFA;
    --purple-light: #EDE9FE;
    --purple-dark:  #5B21B6;
    --purple-deep:  #3B0764;
    --white:        #FFFFFF;
    --gray-50:      #F9FAFB;
    --gray-100:     #F3F4F6;
    --gray-200:     #E5E7EB;
    --gray-400:     #9CA3AF;
    --gray-600:     #4B5563;
    --gray-900:     #111827;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .site-header {
    background: var(--white);
    border-bottom: 2px solid var(--purple-light);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    gap: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(124,58,237,0.07);
  }
  .logo-badge {
    background: var(--purple);
    color: white;
    font-weight: 800;
    font-size: 16px;
    padding: 6px 14px;
    border-radius: 10px;
    letter-spacing: 1.5px;
    flex-shrink: 0;
  }
  .site-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--purple-dark);
    flex: 1;
  }
  .site-sub {
    font-size: 12px;
    color: var(--gray-400);
    font-weight: 400;
  }
  .header-count {
    background: var(--purple-light);
    color: var(--purple-dark);
    font-size: 13px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
  }

  /* ─── MAIN LAYOUT ─── */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  /* ─── CONTROLS ─── */
  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute;
    right: 13px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--gray-400);
    pointer-events: none;
  }
  .search-wrap input {
    width: 100%;
    padding: 10px 38px 10px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    background: var(--white);
    color: var(--gray-900);
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--purple); }
  .search-wrap input::placeholder { color: var(--gray-400); }

  select.folder-filter {
    padding: 10px 14px;
    border: 1.5px solid var(--gray-200);
    border-radius: 12px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    background: var(--white);
    color: var(--gray-600);
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s;
  }
  select.folder-filter:focus { border-color: var(--purple); }

  /* ─── GRID ─── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
    gap: 16px;
  }

  /* ─── CARD ─── */
  .card {
    background: var(--white);
    border-radius: 16px;
    border: 1.5px solid var(--gray-200);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    animation: fadeIn 0.3s ease both;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--purple-mid);
    box-shadow: 0 10px 28px rgba(124,58,237,0.13);
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-thumb {
    width: 100%;
    aspect-ratio: 16/9;
    background: linear-gradient(135deg, var(--purple-light) 0%, #DDD6FE 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .play-circle {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--purple);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 4px 16px rgba(124,58,237,0.35);
  }
  .card:hover .play-circle {
    transform: scale(1.15);
    background: var(--purple-dark);
  }
  .play-triangle {
    width: 0; height: 0;
    border-top: 9px solid transparent;
    border-bottom: 9px solid transparent;
    border-right: none;
    border-left: 17px solid white;
    margin-right: -3px;
  }
  .folder-pill {
    position: absolute;
    top: 8px;
    left: 8px;
    background: rgba(91,33,182,0.88);
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    max-width: 120px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .card-body { padding: 12px 14px 14px; }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--gray-900);
    line-height: 1.5;
    margin-bottom: 6px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-id {
    font-size: 11px;
    color: var(--gray-400);
  }

  /* ─── STATES ─── */
  .state-box {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--gray-400);
    font-size: 16px;
    grid-column: 1 / -1;
  }
  .state-box .icon { font-size: 40px; margin-bottom: 12px; }
  .state-box.loading .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--purple-light);
    border-top-color: var(--purple);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state-box.error { color: #DC2626; }

  /* ─── MODAL ─── */
  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(15,7,40,0.65);
    backdrop-filter: blur(6px);
    z-index: 500;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 20px;
    width: 100%;
    max-width: 820px;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.3);
    animation: popIn 0.25s ease;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.95); }
    to   { opacity: 1; transform: scale(1); }
  }
  .modal-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1.5px solid var(--gray-100);
    gap: 12px;
  }
  .modal-head-info { flex: 1; }
  .modal-head-title {
    font-size: 16px; font-weight: 700; color: var(--gray-900);
    margin-bottom: 4px;
  }
  .modal-head-folder {
    font-size: 12px; color: var(--purple); font-weight: 600;
  }
  .modal-close {
    width: 34px; height: 34px;
    border-radius: 10px;
    background: var(--gray-100);
    border: none; cursor: pointer;
    font-size: 18px; color: var(--gray-600);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
  }
  .modal-close:hover { background: var(--gray-200); }
  .modal-player {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
  }
  .modal-player iframe {
    width: 100%; height: 100%; border: none; display: block;
  }
  .modal-footer {
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    border-top: 1.5px solid var(--gray-100);
  }
  .btn-drive {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px;
    background: var(--purple);
    color: white; font-family: 'Cairo', sans-serif;
    font-size: 13px; font-weight: 600;
    border: none; border-radius: 10px; cursor: pointer;
    text-decoration: none;
    transition: background 0.2s;
  }
  .btn-drive:hover { background: var(--purple-dark); }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-badge">WE</div>
  <div style="flex:1">
    <div class="site-title">WE Core BSS — مكتبة الفيديوهات</div>
    <div class="site-sub">Training &amp; Support Videos</div>
  </div>
  <div class="header-count" id="header-count">جاري التحميل...</div>
</header>

<main class="main">
  <div class="controls">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="ابحث عن فيديو..." oninput="renderVideos()" />
    </div>
    <select class="folder-filter" id="folder-filter" onchange="renderVideos()">
      <option value="">كل الأقسام</option>
    </select>
  </div>

  <div class="grid" id="grid">
    <div class="state-box loading">
      <div class="spinner"></div>
      جاري تحميل الفيديوهات...
    </div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="handleBgClick(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-head-info">
        <div class="modal-head-title" id="modal-title"></div>
        <div class="modal-head-folder" id="modal-folder"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-player" id="modal-player"></div>
    <div class="modal-footer">
  
    </div>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://iygwhapcpdmsasqlfelv.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Z3doYXBjcGRtc2FzcWxmZWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDk5MDQsImV4cCI6MjA4NjkyNTkwNH0.jqU1fEc9kBkXcCfazH6aTnS2XWWzPv0bbixHZgjtrnQ';

  let allVideos = [];

  async function loadVideos() {
    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/Videos?select=id,title,file_id,folder-name&order=id.asc`,
        {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        }
      );
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allVideos = await res.json();
      populateFolders();
      renderVideos();
    } catch (e) {
      document.getElementById('grid').innerHTML =
        `<div class="state-box error"><div class="icon">⚠️</div>فشل تحميل البيانات: ${e.message}</div>`;
      document.getElementById('header-count').textContent = 'خطأ';
    }
  }

  function populateFolders() {
    const folders = [...new Set(allVideos.map(v => v['folder-name']).filter(Boolean))].sort();
    const sel = document.getElementById('folder-filter');
    folders.forEach(f => {
      const o = document.createElement('option');
      o.value = f; o.textContent = f;
      sel.appendChild(o);
    });
  }

  function renderVideos() {
    const q = document.getElementById('search').value.trim().toLowerCase();
    const folder = document.getElementById('folder-filter').value;
    let list = allVideos;
    if (q) list = list.filter(v => (v.title || '').toLowerCase().includes(q));
    if (folder) list = list.filter(v => v['folder-name'] === folder);

    document.getElementById('header-count').textContent = `${list.length} فيديو`;

    const grid = document.getElementById('grid');
    if (list.length === 0) {
      grid.innerHTML = '<div class="state-box"><div class="icon">🎬</div>لا توجد فيديوهات مطابقة</div>';
      return;
    }

    grid.innerHTML = list.map((v, i) => `
      <div class="card" style="animation-delay:${Math.min(i * 0.04, 0.6)}s"
           onclick="openVideo('${v.file_id}','${esc(v.title)}','${esc(v['folder-name'])}')">
        <div class="card-thumb">
          <div class="play-circle"><div class="play-triangle"></div></div>
          ${v['folder-name'] ? `<div class="folder-pill">${v['folder-name']}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${v.title || 'بدون عنوان'}</div>
          <div class="card-id"># ${v.id}</div>
        </div>
      </div>
    `).join('');
  }

  function esc(s) {
    return (s || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');
  }

  function openVideo(fileId, title, folder) {
    document.getElementById('modal-title').textContent = title;
    document.getElementById('modal-folder').textContent = folder ? `📁 ${folder}` : '';
    document.getElementById('modal-player').innerHTML =
      `<iframe src="https://drive.google.com/file/d/${fileId}/preview" allow="autoplay" allowfullscreen></iframe>`;
    document.getElementById('drive-link').href = `https://drive.google.com/file/d/${fileId}/view`;
    document.getElementById('modal-bg').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-bg').classList.remove('open');
    document.getElementById('modal-player').innerHTML = '';
    document.body.style.overflow = '';
  }

  function handleBgClick(e) {
    if (e.target === document.getElementById('modal-bg')) closeModal();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  loadVideos();
</script>
</body>
</html>
