<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <script src="/script/auth.js?v=15.0.1"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSS Tutorial – مكتبة الفيديوهات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --purple:      #5b1f82;
            --purple-mid:  #7c3aad;
            --purple-lt:   #9f6ec7;
            --dark:        #0f0f14;
            --dark2:       #1a1a24;
            --card-bg:     #1e1e2a;
            --text:        #e8e4f0;
            --gold-lt:     #f0d878;
            --radius:      14px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Tajawal',sans-serif; background: var(--dark); color: var(--text); direction:rtl; min-height:100vh; }
        header { 
            background: linear-gradient(135deg,#3a0e5e 0%,#5b1f82 50%,#7c3aad 100%); 
            padding:20px 24px; 
            position:sticky; 
            top:0; 
            z-index:100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .header-inner { max-width:1200px; margin:0 auto; display:flex; align-items:center; gap:15px; }
        .hero { text-align:center; padding:50px 20px; background:linear-gradient(180deg,#2a0d45 0%,var(--dark) 100%); }
        .hero h2 span { color:var(--gold-lt); }
        .stats { display:flex; gap:30px; justify-content:center; margin-top:20px; }
        .stat-n { font-size:1.5rem; font-weight:900; color:var(--gold-lt); display:block; }
        .page { max-width:1200px; margin:0 auto; padding:40px 20px; }
        .folders-grid, .videos-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:20px; }
        .folder-card, .video-card { 
            background:var(--card-bg); 
            border-radius:var(--radius); 
            padding:25px; 
            border:1px solid rgba(255,255,255,0.05); 
            cursor:pointer; 
            transition: all 0.3s ease;
            text-align: center;
        }
        .folder-card:hover, .video-card:hover { 
            transform:translateY(-8px); 
            border-color:var(--purple-lt); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .folder-icon { font-size:3rem; margin-bottom:15px; display:block; }
        .video-thumb { 
            aspect-ratio:16/9; 
            background:#000; 
            border-radius:10px; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            margin-bottom:15px; 
            font-size:2rem; 
            color: var(--purple-lt);
            border: 1px solid #333;
        }
        .back-btn { 
            background:var(--purple-mid); 
            border:none; 
            color:white; 
            padding:12px 25px; 
            border-radius:30px; 
            cursor:pointer; 
            margin-bottom:25px; 
            font-family: inherit;
            transition: 0.2s;
        }
        .back-btn:hover { background: var(--purple-lt); }
        .modal-overlay { 
            display:none; 
            position:fixed; 
            inset:0; 
            background:rgba(0,0,0,0.95); 
            z-index:1000; 
            align-items:center; 
            justify-content:center; 
            padding:20px; 
        }
        .modal-overlay.open { display:flex; }
        .modal-box { width:100%; max-width:1000px; background:var(--dark2); border-radius:20px; overflow:hidden; box-shadow: 0 0 50px rgba(0,0,0,1); }
        .modal-header { padding:20px; display:flex; justify-content:space-between; align-items:center; background: #23232f; }
        .modal-body { width: 100%; background: #000; line-height: 0; }
        video { width: 100%; display: block; max-height: 80vh; }
    </style>
</head>
<body>
<header>
    <div class="header-inner">
        <img src="/img/we-core.png" style="width:40px;height:40px;border-radius:50%;margin-left:10px;">
        <h1>BSS Tutorial</h1>
    </div>
</header>
<div class="hero">
    <h2>مكتبة فيديوهات <span>BSS</span></h2>
    <div class="stats">
        <div class="stat"><span class="stat-n" id="totalFolders">0</span><span>قسم</span></div>
        <div class="stat"><span class="stat-n" id="totalVideos">0</span><span>فيديو</span></div>
    </div>
</div>
<div class="page">
    <div id="view-folders">
        <h3 style="margin-bottom:25px; color: var(--text-dim);">اختر القسم:</h3>
        <div class="folders-grid" id="foldersGrid">
            <p>جاري تحميل الأقسام...</p>
        </div>
    </div>
    <div id="view-videos" style="display:none;">
        <button class="back-btn" onclick="showFolders()">← العودة للأقسام</button>
        <h2 id="currentFolderName" style="margin-bottom:25px; color: var(--gold-lt);"></h2>
        <div class="videos-grid" id="videosGrid"></div>
    </div>
</div>
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
        <div class="modal-header">
            <strong id="modalTitle">اسم الفيديو</strong>
            <button onclick="closeModal()" style="background:none; border:none; color:white; font-size:1.8rem; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body">
            <video id="mainPlayer" controls controlsList="nodownload" oncontextmenu="return false;"></video>
        </div>
    </div>
</div>
<script>
    const SB_URL = 'https://iygwhapcpdmsasqlfelv.supabase.co';
    const SB_KEY = 'sb_publishable_rD9naqrpu1dI-iwchAS0GQ_JkgGysqP';
    const supabaseClient = supabase.createClient(SB_URL, SB_KEY);
    let FOLDERS_DATA = [];
    let currentFolderVideos = [];
    async function loadLibrary() {
        try {
            const token = sessionStorage.getItem('sb-access-token');
            const { data, error } = await supabaseClient.functions.invoke('hyper-task', {
                body: { action: 'get_videos' },
                headers: token ? { Authorization: `Bearer ${token}` } : {}
            });
            if (error) throw error;
            const grouped = data.reduce((acc, file) => {
                const folderName = file.folder || 'عام';
                let folder = acc.find(f => f.name === folderName);
                if (!folder) {
                    folder = { name: folderName, videos: [] };
                    acc.push(folder);
                }
                folder.videos.push(file);
                return acc;
            }, []);
            FOLDERS_DATA = grouped;
            renderFolders();
            document.getElementById('totalFolders').textContent = FOLDERS_DATA.length;
            document.getElementById('totalVideos').textContent = data.length;
        } catch (err) {
            console.error("Load Error:", err.message);
            document.getElementById('foldersGrid').innerHTML = `<p style="color:#ff6b6b">حدث خطأ أثناء تحميل البيانات. تأكد من تسجيل الدخول وصلاحية الفانكشن.</p>`;
        }
    }
    function renderFolders() {
        const grid = document.getElementById('foldersGrid');
        if (FOLDERS_DATA.length === 0) {
            grid.innerHTML = "<p>لا توجد فيديوهات متاحة حالياً.</p>";
            return;
        }
        grid.innerHTML = FOLDERS_DATA.map((f, i) => `
            <div class="folder-card" onclick="openFolder(${i})">
                <span class="folder-icon">📂</span>
                <h3>${f.name}</h3>
                <p style="color: var(--text-dim)">${f.videos.length} فيديو</p>
            </div>
        `).join('');
    }
    function openFolder(idx) {
        const folder = FOLDERS_DATA[idx];
        currentFolderVideos = folder.videos;
        document.getElementById('view-folders').style.display = 'none';
        document.getElementById('view-videos').style.display = 'block';
        document.getElementById('currentFolderName').textContent = folder.name;
        const grid = document.getElementById('videosGrid');
        grid.innerHTML = currentFolderVideos.map((v, vIdx) => `
            <div class="video-card" onclick="playVideo(${vIdx})">
                <div class="video-thumb">▶</div>
                <h4>${v.title}</h4>
            </div>
        `).join('');
    }
    async function playVideo(idx) {
        const video = currentFolderVideos[idx];
        const modalTitle = document.getElementById('modalTitle');
        modalTitle.textContent = "جاري جلب الرابط الآمن...";
        try {
            const token = sessionStorage.getItem('sb-access-token');
            const { data, error } = await supabaseClient.functions.invoke('hyper-task', {
                body: { action: 'get_single_url', path: video.path },
                headers: token ? { Authorization: `Bearer ${token}` } : {}
            });
            if (error) throw error;
            const player = document.getElementById('mainPlayer');
            player.src = data.url;
            modalTitle.textContent = video.title;
            document.getElementById('modalOverlay').classList.add('open');
            player.play();
        } catch (err) {
            console.error("Play Error:", err.message);
            alert("عفواً، لا يمكن تشغيل هذا الفيديو حالياً.");
        }
    }
    function closeModal() {
        const player = document.getElementById('mainPlayer');
        player.pause();
        player.src = "";
        document.getElementById('modalOverlay').classList.remove('open');
    }
    function showFolders() {
        document.getElementById('view-folders').style.display = 'block';
        document.getElementById('view-videos').style.display = 'none';
    }
    document.addEventListener('DOMContentLoaded', loadLibrary);
</script>
<script src="/script/active-users-widget.js"></script>
</body>
</html>
