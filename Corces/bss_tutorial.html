<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSS Tutorial – مكتبة الفيديوهات</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --purple:     #5b1f82;
  --purple-mid: #7c3aad;
  --purple-lt:  #9f6ec7;
  --purple-bg:  #f3edf9;
  --purple-xs:  #faf7fd;
  --gold:       #c9a84c;
  --gold-lt:    #f0d878;
  --dark:       #0f0f14;
  --dark2:      #1a1a24;
  --dark3:      #23232f;
  --card-bg:    #1e1e2a;
  --text:       #e8e4f0;
  --text-dim:   #9990b0;
  --radius:     14px;
  --r-sm:       8px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body {
  font-family:'Tajawal',sans-serif;
  background: var(--dark);
  color: var(--text);
  line-height:1.7;
  direction:rtl;
  min-height:100vh;
}

/* ─── HEADER ─── */
header {
  background: linear-gradient(135deg,#3a0e5e 0%,#5b1f82 50%,#7c3aad 100%);
  padding:0 24px;
  position:sticky;top:0;z-index:300;
  box-shadow:0 2px 30px rgba(0,0,0,0.5);
}
.header-inner {
  max-width:1300px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  gap:16px;min-height:68px;
}
.brand{display:flex;align-items:center;gap:14px;}
.logo-circle {
  width:46px;height:46px;background:white;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:.95rem;color:var(--purple);
  flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.3);
}
.brand-text h1{font-size:1.2rem;font-weight:800;color:white;line-height:1.1;}
.brand-text p{font-size:.75rem;color:rgba(255,255,255,.65);}

/* ─── HERO ─── */
.hero {
  background:linear-gradient(180deg,#2a0d45 0%,var(--dark) 100%);
  text-align:center;padding:56px 24px 40px;
  position:relative;overflow:hidden;
}
.hero h2{font-size:2rem;font-weight:900;color:white;margin-bottom:10px;}
.hero h2 span{color:var(--gold-lt);}
.hero p{color:var(--text-dim);font-size:.95rem;max-width:520px;margin:0 auto;}
.stats{display:flex;gap:32px;justify-content:center;margin-top:28px;flex-wrap:wrap;}
.stat{text-align:center;}
.stat-n{font-size:1.8rem;font-weight:900;color:var(--gold-lt);}
.stat-l{font-size:.78rem;color:var(--text-dim);}

/* ─── MAIN ─── */
.page{max-width:1300px;margin:0 auto;padding:36px 24px 80px;}

/* ─── VIEW: FOLDERS GRID ─── */
.section-label{
  font-size:.78rem;font-weight:700;letter-spacing:2px;
  color:var(--purple-lt);text-transform:uppercase;margin-bottom:16px;
}
.folders-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
  gap:20px;
}
.folder-card {
  background:var(--card-bg);
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.07);
  padding:24px 20px;
  cursor:pointer;
  transition:all .25s ease;
  position:relative;
}
.folder-card:hover{
  transform:translateY(-5px);
  border-color:rgba(124,58,173,.5);
}
.folder-icon{
  width:52px;height:52px;
  background:linear-gradient(135deg,var(--purple) 0%,var(--purple-mid) 100%);
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;margin-bottom:14px;
}
.folder-name{font-size:1rem;font-weight:700;color:white;margin-bottom:6px;}
.folder-count{font-size:.8rem;color:var(--text-dim);}

/* ─── VIEW: VIDEOS ─── */
#view-videos{display:none;}
.back-btn{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.12);
  border-radius:30px;padding:8px 18px;
  color:white;cursor:pointer;margin-bottom:28px;
}
.videos-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:18px;
}
.video-card{
  background:var(--card-bg);
  border-radius:var(--radius);
  border:1px solid rgba(255,255,255,.07);
  overflow:hidden;cursor:pointer;
}
.video-thumb{
  aspect-ratio:16/9;background:#000;
  display:flex;align-items:center;justify-content:center;
}
.video-info{padding:14px 16px;}
.video-title{font-size:.92rem;font-weight:700;color:white;}

/* ─── MODAL ─── */
.modal-overlay{
  display:none;position:fixed;inset:0;z-index:1000;
  background:rgba(0,0,0,.9);backdrop-filter:blur(8px);
  align-items:center;justify-content:center;padding:20px;
}
.modal-overlay.open{display:flex;}
.modal-box{background:var(--dark2);width:100%;max-width:900px;border-radius:18px;overflow:hidden;}
.modal-header{padding:16px;display:flex;justify-content:space-between;color:white;}
.modal-player{position:relative;padding-bottom:56.25%;height:0;}
.modal-player iframe{position:absolute;inset:0;width:100%;height:100%;}
.modal-close{cursor:pointer;background:none;border:none;color:white;font-size:1.5rem;}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <div class="logo-circle">we</div>
      <div class="brand-text">
        <h1>BSS Tutorial</h1>
        <p>مكتبة تدريبية – فريق WE-CORE</p>
      </div>
    </div>
  </div>
</header>

<div class="hero">
  <h2>مكتبة <span>BSS Tutorial</span></h2>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="totalFolders">0</div><div class="stat-l">فولدر</div></div>
    <div class="stat"><div class="stat-n" id="totalVideos">0</div><div class="stat-l">فيديو</div></div>
  </div>
</div>

<div class="page">
  <div id="view-folders">
    <div class="section-label">📁 الفولدرات</div>
    <div class="folders-grid" id="foldersGrid"></div>
  </div>

  <div id="view-videos">
    <button class="back-btn" onclick="showFolders()">رجوع للفولدرات</button>
    <h2 id="currentFolderName" style="margin-bottom:20px;"></h2>
    <div class="videos-grid" id="videosGrid"></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <span id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-player">
      <iframe id="videoFrame" allowfullscreen></iframe>
    </div>
  </div>
</div>

<script>
// 1. ربط بيانات Supabase
const SUPABASE_URL = 'https://iygwhapcpdmsasqlfelv.supabase.co';
const SUPABASE_KEY = 'sb_publishable_rD9naqrpu1dI-iwchAS0GQ_JkgGysqP';
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let FOLDERS = [];
let currentVideos = [];

// 2. جلب البيانات عند التشغيل
async function fetchVideos() {
  const { data, error } = await supabase
    .from('Videos')
    .select('*');

  if (error) {
    console.error("Error:", error);
    return;
  }

  // تجميع البيانات حسب الـ folder-name
  const grouped = data.reduce((acc, row) => {
    const fName = row['folder-name'] || 'Other';
    let folder = acc.find(f => f.name === fName);
    if (!folder) {
      folder = { name: fName, icon: "📁", videos: [] };
      acc.push(folder);
    }
    folder.videos.push({ title: row.title, fileId: row.file_id });
    return acc;
  }, []);

  FOLDERS = grouped;
  renderFolders();
  updateStats();
}

function updateStats() {
  document.getElementById('totalFolders').textContent = FOLDERS.length;
  const total = FOLDERS.reduce((s, f) => s + f.videos.length, 0);
  document.getElementById('totalVideos').textContent = total;
}

function renderFolders() {
  const grid = document.getElementById('foldersGrid');
  grid.innerHTML = FOLDERS.map((f, i) => `
    <div class="folder-card" onclick="openFolder(${i})">
      <div class="folder-icon">${f.icon}</div>
      <div class="folder-name">${f.name}</div>
      <div class="folder-count">${f.videos.length} فيديو</div>
    </div>
  `).join('');
}

function openFolder(idx) {
  const folder = FOLDERS[idx];
  currentVideos = folder.videos;
  document.getElementById('view-folders').style.display = 'none';
  document.getElementById('view-videos').style.display = 'block';
  document.getElementById('currentFolderName').textContent = folder.name;
  
  const vGrid = document.getElementById('videosGrid');
  vGrid.innerHTML = currentVideos.map((v, vIdx) => `
    <div class="video-card" onclick="openVideo(${vIdx})">
      <div class="video-thumb">▶</div>
      <div class="video-info"><div class="video-title">${v.title}</div></div>
    </div>
  `).join('');
}

function showFolders() {
  document.getElementById('view-folders').style.display = 'block';
  document.getElementById('view-videos').style.display = 'none';
}

function openVideo(idx) {
  const video = currentVideos[idx];
  document.getElementById('modalTitle').textContent = video.title;
  document.getElementById('videoFrame').src = `https://drive.google.com/file/d/${video.fileId}/preview`;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('videoFrame').src = '';
}

// بدء التشغيل
document.addEventListener('DOMContentLoaded', fetchVideos);
</script>

</body>
</html>
