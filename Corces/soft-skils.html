<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Curces Soft - الدورات التدريبية</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* تنسيقات سريعة لتظهر الفيديوهات بشكل مرتب */
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; }
        .video-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .video-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        iframe { width: 100%; height: 200px; border: none; border-radius: 4px; }
        h3 { font-size: 1.1em; color: #333; margin-top: 10px; }
        .folder-tag { color: #666; font-size: 0.9em; display: block; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>دورات Soft Skills</h1>
    <div id="video-list" class="video-container">جاري تحميل الفيديوهات...</div>

    <script>
        // 1. إعداد الاتصال بـ Supabase
        // استبدل هذه القيم ببيانات مشروعك الخاصة (Project URL & API Key)
        const SUPABASE_URL = 'https://iygwhapcpdmsasqlfelv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml5Z3doYXBjcGRtc2FzcWxmZWx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEzNDk5MDQsImV4cCI6MjA4NjkyNTkwNH0.jqU1fEc9kBkXcCfazH6aTnS2XWWzPv0bbixHZgjtrnQ'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 2. دالة جلب البيانات من جدول "Curces Soft"
        async function fetchVideos() {
            try {
                const { data, error } = await supabaseClient
                    .from('Curces Soft') // التعديل: اسم الجدول كما في الصورة بالمسافة
                    .select('*');

                if (error) throw error;

                const videoList = document.getElementById('video-list');
                videoList.innerHTML = ''; // مسح رسالة التحميل

                if (data.length === 0) {
                    videoList.innerHTML = '<p>لا توجد فيديوهات حالياً في هذا القسم.</p>';
                    return;
                }

                data.forEach(v => {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    
                    // التعديلات بناءً على صور قاعدة البيانات:
                    // اسم العمود لـ Google Drive ID هو file_id
                    // اسم العمود للقسم هو folder-name
                    card.innerHTML = `
                        <iframe src="https://drive.google.com/file/d/${v.file_id}/preview"></iframe>
                        <h3>${v.title}</h3>
                        <span class="folder-tag">القسم: ${v['folder-name']}</span>
                    `;
                    videoList.appendChild(card);
                });

            } catch (err) {
                console.error('Error:', err);
                document.getElementById('video-list').innerHTML = 'حدث خطأ أثناء تحميل البيانات.';
            }
        }

        // تشغيل الدالة عند فتح الصفحة
        fetchVideos();
    </script>
</body>
</html>
