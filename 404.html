<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script src="script/auth.js?v=12.0.1"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Arvo">
    <style>
        /*======================
            404 page
        =======================*/
        .page_404 {
            padding: 40px 0;
            background: #fff;
            font-family: 'Arvo', serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .page_404 img {
            width: 100%;
        }

        .four_zero_four_bg {
            background-image: url(https://cdn.dribbble.com/users/285475/screenshots/2083086/dribbble_1.gif);
            height: 400px;
            background-position: center;
            background-repeat: no-repeat;
            background-size: contain;
            animation: float 3s ease-in-out infinite;
        }

        .four_zero_four_bg h1 {
            font-size: 80px;
            margin: 0;
            color: #333;
        }

        .contant_box_404 {
            margin-top: -50px;
            text-align: center;
        }

        .contant_box_404 h3 {
            font-size: 30px;
            margin: 20px 0;
            color: #333;
        }

        .contant_box_404 p {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }

        .link_404 {
            color: #fff !important;
            padding: 10px 20px;
            background: #39ac31;
            margin: 20px 0;
            display: inline-block;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .link_404:hover {
            background-color: #2d8a27;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }
    </style>
<script src="script/active-users-widget.js"></script>
</head>
<body>
    <section class="page_404">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    <div class="col-sm-10 col-sm-offset-1 text-center">
                        <div class="four_zero_four_bg">
                            <h1 class="text-center"></h1>
                            <br><br>
                        </div>
                        <div class="contant_box_404">
                            <br><br>
                            <h3 class="h2"> يبدو ان الصفحه تحت الانشاء⚙️</h3>
                            <p>نعمل ع تطوير الموقع الان ⚙️</p>
                            <a href="./index.html" class="link_404">العودة إلى الصفحة الرئيسية</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
<script src="script/access-control.js"></script>

<script>
  window.addEventListener('load', function() {
    if (typeof ActiveUsersWidget !== 'undefined') {
      ActiveUsersWidget.init({ position: 'corner' });
    }
  });
</script>
<style>
.back-btn-float{position:fixed;bottom:24px;left:20px;z-index:9999;display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:50px;background:linear-gradient(135deg,#5b21b6,#7c3aed);color:#fff;font-family:"Cairo",sans-serif;font-size:14px;font-weight:700;border:none;cursor:pointer;box-shadow:0 6px 22px rgba(91,33,182,.38);text-decoration:none;transition:transform .2s,box-shadow .2s,opacity .2s;animation:floatIn .4s ease both;}
.back-btn-float:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(91,33,182,.48);opacity:.93;}
.back-btn-float i{font-size:15px;}
@keyframes floatIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:480px){.back-btn-float{bottom:16px;left:14px;padding:10px 16px;font-size:13px;}}
</style>
<a href="index.html" class="back-btn-float"><i class="fa-solid fa-arrow-right"></i> الرئيسية</a>
</body>

</html>
